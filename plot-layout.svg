<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 880" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="900" height="880" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="21" font-weight="bold">Plot &amp; Hall Layout - 38-cent corner plot (roads on south &amp; east)</text>
  <text x="450" y="50" text-anchor="middle" font-size="13" fill="#555">Biochar &amp; enriched bio-fertilizer unit - single clear-span ~10,000 sq ft hall with 3 movable partition rails (2 t/day-ready); schematic, not to scale</text>

  <!-- East road -->
  <rect x="740" y="70" width="60" height="740" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="770" y="440" text-anchor="middle" font-size="13" fill="#666" transform="rotate(90 770 440)">EAST ROAD</text>

  <!-- South road -->
  <rect x="60" y="760" width="740" height="50" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="410" y="790" text-anchor="middle" font-size="13" fill="#666">SOUTH ROAD</text>

  <!-- Plot / greenbelt -->
  <rect x="60" y="70" width="670" height="680" fill="#d9ead3" stroke="#38761d" stroke-width="2"/>
  <text x="395" y="90" text-anchor="middle" font-size="12" fill="#38761d" font-weight="bold">GREENBELT / SETBACK - perimeter tree belt (KSPCB requirement) - balance ~15 cents</text>

  <!-- Single clear-span covered hall (~10,000 sq ft over ~23 cents) -->
  <rect x="95" y="110" width="600" height="400" fill="#ffffff" stroke="#333" stroke-width="2.5"/>
  <text x="395" y="130" text-anchor="middle" font-size="13" font-weight="bold">SINGLE CLEAR-SPAN COVERED HALL  ~10,000 sq ft  (built for the 2 t/day endgame)</text>

  <!-- Four reconfigurable bays -->
  <rect x="110" y="145" width="135" height="315" fill="#f4cccc" stroke="#990000" stroke-width="1.2"/>
  <text x="177" y="295" text-anchor="middle" font-size="12.5" font-weight="bold">PROCESS</text>
  <text x="177" y="314" text-anchor="middle" font-size="10.5" fill="#555">reactor (+ space for</text>
  <text x="177" y="329" text-anchor="middle" font-size="10.5" fill="#555">Phase-2/3 module),</text>
  <text x="177" y="344" text-anchor="middle" font-size="10.5" fill="#555">cooling</text>

  <rect x="255" y="145" width="135" height="315" fill="#d0e0e3" stroke="#0b5394" stroke-width="1.2"/>
  <text x="322" y="300" text-anchor="middle" font-size="12.5" font-weight="bold">CURING /</text>
  <text x="322" y="319" text-anchor="middle" font-size="12.5" font-weight="bold">ENRICHMENT</text>

  <rect x="400" y="145" width="135" height="315" fill="#fce5cd" stroke="#b45309" stroke-width="1.2"/>
  <text x="467" y="300" text-anchor="middle" font-size="12.5" font-weight="bold">PACKING /</text>
  <text x="467" y="319" text-anchor="middle" font-size="12.5" font-weight="bold">SIEVING</text>

  <rect x="545" y="145" width="135" height="315" fill="#d9d2e9" stroke="#674ea7" stroke-width="1.2"/>
  <text x="612" y="300" text-anchor="middle" font-size="12.5" font-weight="bold">PRODUCT</text>
  <text x="612" y="319" text-anchor="middle" font-size="12.5" font-weight="bold">STORAGE</text>

  <!-- 3 movable partition rails (on the bay boundaries) -->
  <line x1="250" y1="145" x2="250" y2="460" stroke="#e06666" stroke-width="3" stroke-dasharray="7 5"/>
  <line x1="395" y1="145" x2="395" y2="460" stroke="#e06666" stroke-width="3" stroke-dasharray="7 5"/>
  <line x1="540" y1="145" x2="540" y2="460" stroke="#e06666" stroke-width="3" stroke-dasharray="7 5"/>
  <text x="250" y="478" text-anchor="middle" font-size="10" fill="#cc0000" font-weight="bold">rail 1</text>
  <text x="395" y="478" text-anchor="middle" font-size="10" fill="#cc0000" font-weight="bold">rail 2</text>
  <text x="540" y="478" text-anchor="middle" font-size="10" fill="#cc0000" font-weight="bold">rail 3</text>
  <text x="395" y="497" text-anchor="middle" font-size="11" fill="#cc0000">3 movable partition rails - open to run the hall as one large bay, close to separate bays</text>

  <!-- Stack -->
  <rect x="118" y="92" width="14" height="24" fill="#666"/>
  <text x="150" y="106" font-size="10" fill="#666">stack</text>

  <!-- Office / lab / weighbridge / utilities -->
  <rect x="95" y="540" width="600" height="95" fill="#fff2cc" stroke="#bf9000" stroke-width="1.5"/>
  <text x="395" y="580" text-anchor="middle" font-size="13" font-weight="bold">Office / Lab (QC) / Weighbridge / Utilities</text>
  <text x="395" y="602" text-anchor="middle" font-size="11.5" fill="#555">borewell + tanks, electrical, fire system, 1-2 day feedstock day-bin</text>

  <!-- Gates -->
  <rect x="340" y="742" width="110" height="30" fill="#ffffff" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="395" y="762" text-anchor="middle" font-size="11" font-weight="bold">GATE (south) - material in</text>
  <rect x="700" y="330" width="42" height="90" fill="#ffffff" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="721" y="378" text-anchor="middle" font-size="10.5" font-weight="bold" transform="rotate(90 721 378)">GATE (east) - dispatch</text>

  <!-- North arrow -->
  <line x1="690" y1="120" x2="690" y2="82" stroke="#333" stroke-width="2"/>
  <polygon points="690,74 685,86 695,86" fill="#333"/>
  <text x="690" y="135" text-anchor="middle" font-size="12" font-weight="bold">N</text>

  <!-- Off-site note -->
  <text x="410" y="850" text-anchor="middle" font-size="12" fill="#38761d">Own 10-acre land (feedstock aggregation, sun-drying, chipping, bulk storage) ~200 m away</text>
</svg>
