<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 800" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="860" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" font-size="22" font-weight="bold">Plot Layout  38 cent (~40 m x 38.5 m H 1,538 m˛)</text>
  <text x="430" y="50" text-anchor="middle" font-size="13" fill="#555">Biochar &amp; enriched bio-fertilizer unit  schematic (2 t/day-ready), not strictly to scale</text>

  <!-- Greenbelt (full plot) -->
  <rect x="40" y="70" width="780" height="690" fill="#d9ead3" stroke="#38761d" stroke-width="2"/>
  <text x="430" y="88" text-anchor="middle" font-size="12" fill="#38761d" font-weight="bold">GREENBELT / SETBACK (~550 m˛, ~33%)  perimeter tree belt (KSPCB requirement)</text>

  <!-- Inner working area -->
  <rect x="95" y="100" width="670" height="620" fill="#ffffff" stroke="#999" stroke-width="1"/>

  <!-- Row 1: Feedstock day-bin, Pyrolysis, Product storage -->
  <rect x="110" y="120" width="150" height="150" fill="#fce5cd" stroke="#b45309" stroke-width="1.5"/>
  <text x="185" y="185" text-anchor="middle" font-size="13" font-weight="bold">Feedstock</text>
  <text x="185" y="203" text-anchor="middle" font-size="13" font-weight="bold">day-bin</text>
  <text x="185" y="223" text-anchor="middle" font-size="12" fill="#555">~80 m˛ (12 day)</text>

  <rect x="280" y="120" width="220" height="150" fill="#f4cccc" stroke="#990000" stroke-width="1.5"/>
  <text x="390" y="170" text-anchor="middle" font-size="13" font-weight="bold">PYROLYSIS + EMISSION</text>
  <text x="390" y="188" text-anchor="middle" font-size="13" font-weight="bold">CONTROL</text>
  <text x="390" y="208" text-anchor="middle" font-size="12" fill="#555">~150 m˛ · reactor #1 +</text>
  <text x="390" y="224" text-anchor="middle" font-size="12" fill="#555">space for reactor #2</text>
  <!-- stack -->
  <rect x="470" y="105" width="14" height="30" fill="#666"/>
  <text x="500" y="120" font-size="10" fill="#666">stack</text>

  <rect x="520" y="120" width="225" height="150" fill="#d9d2e9" stroke="#674ea7" stroke-width="1.5"/>
  <text x="632" y="185" text-anchor="middle" font-size="13" font-weight="bold">Product storage</text>
  <text x="632" y="203" text-anchor="middle" font-size="13" font-weight="bold">+ bagging</text>
  <text x="632" y="223" text-anchor="middle" font-size="12" fill="#555">~150 m˛</text>

  <!-- Central road spine -->
  <rect x="110" y="290" width="635" height="70" fill="#efefef" stroke="#999" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="427" y="332" text-anchor="middle" font-size="12" fill="#777">INTERNAL ROAD / LOADER TURNING (~258 m˛)</text>

  <!-- Row 2: Enrichment/composting, Office/lab/utilities -->
  <rect x="110" y="380" width="360" height="300" fill="#d0e0e3" stroke="#0b5394" stroke-width="1.5"/>
  <text x="290" y="520" text-anchor="middle" font-size="14" font-weight="bold">ENRICHMENT / COMPOSTING</text>
  <text x="290" y="540" text-anchor="middle" font-size="14" font-weight="bold">+ CURING</text>
  <text x="290" y="562" text-anchor="middle" font-size="12" fill="#555">~250 m˛ (biochar + manure/</text>
  <text x="290" y="578" text-anchor="middle" font-size="12" fill="#555">neem/rock-P + microbes)</text>

  <rect x="490" y="380" width="255" height="300" fill="#fff2cc" stroke="#bf9000" stroke-width="1.5"/>
  <text x="617" y="500" text-anchor="middle" font-size="13" font-weight="bold">Office / Lab (QC)</text>
  <text x="617" y="520" text-anchor="middle" font-size="13" font-weight="bold">Utilities / Water</text>
  <text x="617" y="540" text-anchor="middle" font-size="12" fill="#555">~100 m˛</text>
  <text x="617" y="565" text-anchor="middle" font-size="12" fill="#555">borewell + tanks,</text>
  <text x="617" y="581" text-anchor="middle" font-size="12" fill="#555">electrical, fire system</text>

  <!-- Weighbridge + Gate at bottom -->
  <rect x="360" y="700" width="120" height="40" fill="#cccccc" stroke="#666" stroke-width="1.5"/>
  <text x="420" y="725" text-anchor="middle" font-size="12" font-weight="bold">WEIGHBRIDGE</text>
  <rect x="500" y="700" width="90" height="40" fill="#ffffff" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="545" y="725" text-anchor="middle" font-size="12">GATE</text>

  <!-- North arrow -->
  <line x1="810" y1="120" x2="810" y2="80" stroke="#333" stroke-width="2"/>
  <polygon points="810,72 805,84 815,84" fill="#333"/>
  <text x="810" y="135" text-anchor="middle" font-size="12" font-weight="bold">N</text>

  <!-- Road + farm direction -->
  <text x="545" y="775" text-anchor="middle" font-size="12" fill="#333">Ľ PWD ROAD (site access)</text>
  <text x="185" y="775" text-anchor="middle" font-size="12" fill="#38761d">’ Farm (feedstock + sun-drying) ~200 m</text>
</svg>
