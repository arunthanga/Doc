<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 880" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="900" height="880" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="21" font-weight="bold">Plot &amp; Hall Layout - 38-cent corner plot (roads on south &amp; east)</text>
  <text x="450" y="50" text-anchor="middle" font-size="13" fill="#555">Biochar &amp; enriched bio-fertilizer unit - ~11,000 sq ft covered hall (2 t/day-ready); schematic, not strictly to scale</text>

  <!-- East road -->
  <rect x="740" y="70" width="60" height="740" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="770" y="440" text-anchor="middle" font-size="13" fill="#666" transform="rotate(90 770 440)">EAST ROAD</text>

  <!-- South road -->
  <rect x="60" y="760" width="740" height="50" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="410" y="790" text-anchor="middle" font-size="13" fill="#666">SOUTH ROAD</text>

  <!-- Plot / greenbelt -->
  <rect x="60" y="70" width="670" height="680" fill="#d9ead3" stroke="#38761d" stroke-width="2"/>
  <text x="395" y="90" text-anchor="middle" font-size="12" fill="#38761d" font-weight="bold">GREENBELT / SETBACK - perimeter tree belt (KSPCB requirement) - balance ~13 cents</text>

  <!-- Covered hall (~11,000 sq ft over ~25 cents) -->
  <rect x="95" y="110" width="600" height="400" fill="#ffffff" stroke="#333" stroke-width="2"/>
  <text x="395" y="128" text-anchor="middle" font-size="13" font-weight="bold">COVERED HALL  ~11,000 sq ft  (built for the 2 t/day endgame)</text>

  <!-- Hall A: main process & product -->
  <rect x="110" y="140" width="255" height="355" fill="#f4cccc" stroke="#990000" stroke-width="1.5"/>
  <text x="237" y="285" text-anchor="middle" font-size="14" font-weight="bold">MAIN PROCESS &amp;</text>
  <text x="237" y="305" text-anchor="middle" font-size="14" font-weight="bold">PRODUCT HALL</text>
  <text x="237" y="330" text-anchor="middle" font-size="11.5" fill="#555">pyrolysis reactor (+ space for</text>
  <text x="237" y="346" text-anchor="middle" font-size="11.5" fill="#555">Phase-2/3 module), char cooling,</text>
  <text x="237" y="362" text-anchor="middle" font-size="11.5" fill="#555">sieving, bagging, product storage</text>
  <text x="237" y="384" text-anchor="middle" font-size="11.5" fill="#777">~7,000 sq ft</text>

  <!-- Central aisle -->
  <rect x="375" y="140" width="70" height="355" fill="#efefef" stroke="#999" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="410" y="310" text-anchor="middle" font-size="12" fill="#777" transform="rotate(90 410 310)">CENTRAL MATERIAL AISLE</text>

  <!-- Hall B: enrichment, curing & packing -->
  <rect x="455" y="140" width="225" height="355" fill="#d0e0e3" stroke="#0b5394" stroke-width="1.5"/>
  <text x="567" y="290" text-anchor="middle" font-size="14" font-weight="bold">ENRICHMENT,</text>
  <text x="567" y="310" text-anchor="middle" font-size="14" font-weight="bold">CURING &amp; PACKING</text>
  <text x="567" y="330" text-anchor="middle" font-size="14" font-weight="bold">HALL</text>
  <text x="567" y="354" text-anchor="middle" font-size="11.5" fill="#555">char + manure/neem/rock-P</text>
  <text x="567" y="370" text-anchor="middle" font-size="11.5" fill="#555">+ microbes; curing; packing</text>
  <text x="567" y="392" text-anchor="middle" font-size="11.5" fill="#777">~3,500 sq ft</text>

  <!-- Stack -->
  <rect x="118" y="92" width="14" height="24" fill="#666"/>
  <text x="150" y="106" font-size="10" fill="#666">stack</text>

  <!-- Office / lab / weighbridge / utilities -->
  <rect x="95" y="540" width="600" height="95" fill="#fff2cc" stroke="#bf9000" stroke-width="1.5"/>
  <text x="395" y="580" text-anchor="middle" font-size="13" font-weight="bold">Office / Lab (QC) / Weighbridge / Utilities</text>
  <text x="395" y="602" text-anchor="middle" font-size="11.5" fill="#555">borewell + tanks, electrical, fire system, 1-2 day feedstock day-bin</text>

  <!-- Gates -->
  <rect x="340" y="742" width="110" height="30" fill="#ffffff" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="395" y="762" text-anchor="middle" font-size="11" font-weight="bold">GATE (south) - material in</text>
  <rect x="700" y="330" width="42" height="90" fill="#ffffff" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="721" y="378" text-anchor="middle" font-size="10.5" font-weight="bold" transform="rotate(90 721 378)">GATE (east) - dispatch</text>

  <!-- North arrow -->
  <line x1="690" y1="120" x2="690" y2="82" stroke="#333" stroke-width="2"/>
  <polygon points="690,74 685,86 695,86" fill="#333"/>
  <text x="690" y="135" text-anchor="middle" font-size="12" font-weight="bold">N</text>

  <!-- Off-site note -->
  <text x="410" y="850" text-anchor="middle" font-size="12" fill="#38761d">Own 10-acre land (feedstock aggregation, sun-drying, chipping, bulk storage) ~200 m away</text>
</svg>
