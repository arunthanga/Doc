<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 880" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="900" height="880" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="21" font-weight="bold">Function / Marriage Hall - Alternate-Use Layout (private)</text>
  <text x="450" y="50" text-anchor="middle" font-size="13" fill="#555">Same ~9,000 sq ft hall shell on the 38-cent corner plot (roads south &amp; east); stage WEST, entry EAST; schematic, not to scale</text>

  <!-- East road -->
  <rect x="740" y="70" width="60" height="740" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="770" y="440" text-anchor="middle" font-size="13" fill="#666" transform="rotate(90 770 440)">EAST ROAD</text>

  <!-- South road -->
  <rect x="60" y="760" width="740" height="50" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="410" y="790" text-anchor="middle" font-size="13" fill="#666">SOUTH ROAD</text>

  <!-- Plot -->
  <rect x="60" y="70" width="670" height="680" fill="#eef7ea" stroke="#38761d" stroke-width="2"/>
  <text x="675" y="112" text-anchor="middle" font-size="10" font-weight="bold" fill="#3d85c6">Borewell (NE)</text>

  <!-- Hall -->
  <rect x="95" y="140" width="600" height="400" fill="#ffffff" stroke="#333" stroke-width="2.5"/>

  <!-- North: kitchen + power/service (fixed) -->
  <rect x="110" y="155" width="570" height="90" fill="#fce5cd" stroke="#b45309" stroke-width="1.8"/>
  <text x="395" y="188" text-anchor="middle" font-size="13" font-weight="bold">KITCHEN + POWER / SERVICE - NORTH (fixed, full width)</text>
  <text x="395" y="207" text-anchor="middle" font-size="10.5" fill="#555">cooking, prep, wash-up, service counters; power + plumbing + sewage on N &amp; W</text>
  <text x="395" y="223" text-anchor="middle" font-size="10.5" fill="#555">exhaust / chimney at north</text>
  <rect x="640" y="140" width="14" height="22" fill="#666"/>
  <text x="632" y="136" font-size="9" fill="#666">chy</text>

  <!-- NW toilets -->
  <rect x="110" y="255" width="130" height="55" fill="#cfe2f3" stroke="#3d85c6" stroke-width="1.3"/>
  <text x="175" y="278" text-anchor="middle" font-size="10.5" font-weight="bold">Toilets / handwash</text>
  <text x="175" y="294" text-anchor="middle" font-size="9.5" fill="#555">(NW, shared)</text>

  <!-- West rooms behind stage -->
  <rect x="110" y="320" width="130" height="140" fill="#d9d2e9" stroke="#674ea7" stroke-width="1.3"/>
  <text x="175" y="360" text-anchor="middle" font-size="10.5" font-weight="bold">Bride room</text>
  <text x="175" y="382" text-anchor="middle" font-size="10.5" font-weight="bold">Groom room</text>
  <text x="175" y="404" text-anchor="middle" font-size="10.5" font-weight="bold">Relatives'</text>
  <text x="175" y="420" text-anchor="middle" font-size="10.5" font-weight="bold">rooms</text>
  <text x="175" y="440" text-anchor="middle" font-size="9" fill="#555">(behind stage backdrop)</text>

  <!-- Stage strip (west, in front of rooms) -->
  <rect x="245" y="255" width="55" height="270" fill="#f9cb9c" stroke="#b45309" stroke-width="1.3"/>
  <text x="272" y="395" text-anchor="middle" font-size="12" font-weight="bold" transform="rotate(90 272 395)">STAGE (WEST) - couple faces EAST</text>

  <!-- Function/marriage hall -->
  <rect x="310" y="255" width="270" height="270" fill="#d0e0e3" stroke="#0b5394" stroke-width="1.3"/>
  <text x="445" y="380" text-anchor="middle" font-size="14" font-weight="bold">FUNCTION / MARRIAGE HALL</text>
  <text x="445" y="401" text-anchor="middle" font-size="10.5" fill="#555">seating faces the WEST stage (~600)</text>

  <!-- movable partition -->
  <line x1="580" y1="255" x2="580" y2="525" stroke="#e06666" stroke-width="3" stroke-dasharray="7 5"/>
  <text x="580" y="240" text-anchor="middle" font-size="9.5" fill="#cc0000" font-weight="bold">movable partition</text>

  <!-- Dining -->
  <rect x="595" y="255" width="85" height="270" fill="#d9ead3" stroke="#38761d" stroke-width="1.3"/>
  <text x="637" y="385" text-anchor="middle" font-size="12" font-weight="bold" transform="rotate(90 637 385)">DINING (~1/4)</text>

  <!-- Handwash near dining/kitchen -->
  <text x="637" y="243" text-anchor="middle" font-size="8.5" fill="#3d85c6">handwash</text>

  <!-- Gates -->
  <rect x="470" y="742" width="150" height="30" fill="#ffffff" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="545" y="762" text-anchor="middle" font-size="10.5" font-weight="bold">GATE (south) - kitchen / service</text>
  <rect x="700" y="300" width="42" height="95" fill="#ffffff" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="721" y="348" text-anchor="middle" font-size="10" font-weight="bold" transform="rotate(90 721 348)">GATE (east) - guest entry</text>

  <!-- North arrow -->
  <line x1="90" y1="120" x2="90" y2="82" stroke="#333" stroke-width="2"/>
  <polygon points="90,74 85,86 95,86" fill="#333"/>
  <text x="90" y="135" text-anchor="middle" font-size="12" font-weight="bold">N</text>

  <text x="410" y="720" text-anchor="middle" font-size="11" fill="#555">Guests enter from the EAST and face the WEST stage; dining expands when the movable partition is opened after the ceremony.</text>
</svg>
